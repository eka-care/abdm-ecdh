name: CI — Java

on:
  push:
    branches: [main]
    paths: ['java/**']
  pull_request:
    branches: [main]
    paths: ['java/**']

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'
      - name: Test
        working-directory: java
        run: mvn -B test
