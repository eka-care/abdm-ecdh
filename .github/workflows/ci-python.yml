name: CI — Python

on:
  push:
    branches: [main]
    paths: ['python/**']
  pull_request:
    branches: [main]
    paths: ['python/**']

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        working-directory: python
        run: pip install -e ".[dev]"
      - name: Test
        working-directory: python
        run: pytest
